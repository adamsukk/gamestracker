<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FN·TRACK — Player Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:          #08080f;
      --bg-card:     #0e0e1a;
      --bg-card2:    #12121f;
      --border:      rgba(124,58,237,0.18);
      --border-soft: rgba(255,255,255,0.06);
      --purple:      #7c3aed;
      --purple-light:#c4b5fd;
      --purple-mid:  #a78bfa;
      --green:       #4ade80;
      --red:         #f87171;
      --amber:       #fbbf24;
      --blue:        #60a5fa;
      --ltm:         #c084fc;
      --text:        #e2e8f0;
      --text-muted:  #64748b;
      --text-dim:    #94a3b8;
      --font-ui:     'Inter', -apple-system, sans-serif;
      --font-display:'Rajdhani', sans-serif;
    }
    html { background: var(--bg); }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; }

    /* ─── NAV ─── */
    nav {
      position: sticky; top: 0; z-index: 200;
      height: 56px; display: flex; align-items: center; gap: 16px; padding: 0 24px;
      background: rgba(8,8,15,0.90); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-soft);
    }
    .nav-logo { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 0.05em; color: var(--purple-light); white-space: nowrap; flex-shrink: 0; }
    .nav-logo span { color: var(--text-muted); font-weight: 500; }
    .search-form { flex: 1; max-width: 500px; display: flex; align-items: center; gap: 6px; }
    .search-wrap { flex: 1; position: relative; display: flex; align-items: center; }
    .search-icon { position: absolute; left: 11px; width: 15px; height: 15px; color: var(--text-muted); pointer-events: none; }
    .search-input {
      width: 100%; height: 36px; padding: 0 12px 0 34px;
      background: var(--bg-card2); border: 1px solid var(--border-soft); border-radius: 9px;
      color: var(--text); font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--purple); }
    .platform-select {
      height: 36px; padding: 0 10px; background: var(--bg-card2); border: 1px solid var(--border-soft);
      border-radius: 9px; color: var(--text-dim); font-family: var(--font-ui); font-size: 13px;
      font-weight: 500; outline: none; cursor: pointer; transition: border-color 0.15s;
    }
    .platform-select:focus { border-color: var(--purple); }
    .platform-select option { background: #1a1a2e; }
    .btn-search {
      height: 36px; padding: 0 16px; background: var(--purple); border: none; border-radius: 9px;
      color: #fff; font-family: var(--font-ui); font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: opacity 0.15s; flex-shrink: 0;
    }
    .btn-search:hover { opacity: 0.85; }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
    .nav-right { margin-left: auto; flex-shrink: 0; }
    .btn-refresh {
      display: flex; align-items: center; gap: 6px; height: 36px; padding: 0 14px;
      border-radius: 9px; border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); font-family: var(--font-ui); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-refresh:hover { background: rgba(124,58,237,0.12); color: var(--purple-light); border-color: var(--purple); }
    .btn-refresh svg { width: 14px; height: 14px; }
    .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── HERO ─── */
    .hero {
      position: relative; height: 150px;
      background: radial-gradient(ellipse 90% 120% at 50% 0%, rgba(124,58,237,0.40) 0%, transparent 70%);
      border-bottom: 1px solid var(--border-soft);
    }
    .hero-grid {
      position: absolute; inset: 0; overflow: hidden;
      background-image: linear-gradient(rgba(124,58,237,0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(124,58,237,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ─── PROFILE (outside hero, overlaps via negative margin) ─── */
    .profile-outer {
      max-width: 1200px; margin: -44px auto 0; padding: 0 24px;
      position: relative; z-index: 10;
    }
    .profile-card { display: flex; align-items: flex-end; gap: 20px; }
    .avatar {
      width: 88px; height: 88px; border-radius: 16px; flex-shrink: 0;
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      border: 3px solid rgba(196,181,253,0.35);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 30px; font-weight: 700;
      color: #fff; letter-spacing: 0.05em;
      box-shadow: 0 8px 32px rgba(124,58,237,0.45);
    }
    .profile-info { padding-bottom: 6px; }
    .profile-name { font-family: var(--font-display); font-size: 30px; font-weight: 700; letter-spacing: 0.03em; color: #fff; line-height: 1; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
    .profile-meta { margin-top: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .badge { padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; }
    .badge-bp       { background: rgba(251,191,36,0.18); color: var(--amber);       border: 1px solid rgba(251,191,36,0.30); }
    .badge-platform { background: rgba(124,58,237,0.18); color: var(--purple-mid);  border: 1px solid rgba(124,58,237,0.30); }
    .badge-updated  { background: rgba(100,116,139,0.18); color: var(--text-dim);   border: 1px solid var(--border-soft);    font-size: 11px; }

    /* ─── TAB NAV ─── */
    .tab-nav {
      max-width: 1200px; margin: 28px auto 0; padding: 0 24px;
      display: flex; gap: 2px; border-bottom: 1px solid var(--border-soft);
    }
    .tab-btn {
      padding: 10px 20px; border: none; background: transparent; cursor: pointer;
      font-family: var(--font-ui); font-size: 13px; font-weight: 600;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.15s; letter-spacing: 0.03em;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--purple-light); border-bottom-color: var(--purple); }

    /* ─── MAIN ─── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 56px; }

    /* ─── LANDING ─── */
    .landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 14px; text-align: center; }
    .landing-icon { font-size: 48px; opacity: 0.25; }
    .landing-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--text-dim); }
    .landing-sub   { font-size: 14px; color: var(--text-muted); }

    /* ─── CONTROLS ─── */
    .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-label { font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
    .toggle-group { display: flex; gap: 3px; background: var(--bg-card2); border-radius: 10px; padding: 3px; border: 1px solid var(--border-soft); }
    .toggle-btn { padding: 6px 16px; border-radius: 7px; border: none; background: transparent; font-family: var(--font-ui); font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .toggle-btn.active { background: var(--purple); color: #fff; }
    .toggle-btn:not(.active):hover { color: var(--text); }

    /* ─── OVERALL GRID ─── */
    .stats-overall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px; padding: 16px; }
    .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: #fff; line-height: 1; }
    .stat-sub   { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ─── MODE CARDS ─── */
    .modes-label { font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
    .modes-grid  { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .mode-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .mode-card.no-data { opacity: 0.5; }
    .mode-header { display: flex; align-items: center; justify-content: space-between; }
    .mode-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .mode-dot  { width: 8px; height: 8px; border-radius: 50%; }
    .mode-solo  .mode-name { color: var(--blue); }   .mode-solo  .mode-dot { background: var(--blue); }
    .mode-duo   .mode-name { color: var(--green); }  .mode-duo   .mode-dot { background: var(--green); }
    .mode-trio  .mode-name { color: var(--red); }    .mode-trio  .mode-dot { background: var(--red); }
    .mode-squad .mode-name { color: var(--amber); }  .mode-squad .mode-dot { background: var(--amber); }
    .mode-ltm   .mode-name { color: var(--ltm); }    .mode-ltm   .mode-dot { background: var(--ltm); }
    .mode-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mode-stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
    .mode-stat-val   { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
    .mode-matches    { font-size: 11px; color: var(--text-muted); padding-top: 4px; border-top: 1px solid var(--border-soft); }
    .no-data-label   { font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* ─── EVENTS TAB ─── */
    .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .event-card {
      background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 12px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .event-img { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--bg-card2); }
    .event-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .event-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: #fff; line-height: 1.2; }
    .event-text  { font-size: 13px; color: var(--text-dim); line-height: 1.55; }

    /* ─── LEADERBOARD ─── */
    .lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-soft); }
    .lb-table th.num { text-align: right; }
    .lb-table td { padding: 12px; border-bottom: 1px solid var(--border-soft); font-size: 14px; color: var(--text); }
    .lb-table td.num { text-align: right; font-family: var(--font-display); font-size: 16px; font-weight: 700; color: #fff; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr.me td { background: rgba(124,58,237,0.08); }
    .lb-table tr:hover td { background: rgba(255,255,255,0.03); }
    .lb-rank { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text-muted); }
    .lb-rank.gold   { color: var(--amber); }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #cd7c54; }
    .lb-player { font-weight: 600; }
    .lb-platform { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .lb-sort-btns { display: flex; gap: 4px; }
    .lb-sort-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border-soft); background: transparent; font-family: var(--font-ui); font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .lb-sort-btn.active { background: rgba(124,58,237,0.2); color: var(--purple-light); border-color: var(--purple); }
    .lb-empty { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }

    /* ─── LOADING / ERROR ─── */
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 16px; }
    .spinner { width: 38px; height: 38px; border-radius: 50%; border: 3px solid var(--border-soft); border-top-color: var(--purple); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }
    .error-box { margin: 40px auto; max-width: 480px; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); border-radius: 12px; padding: 24px; text-align: center; }
    .error-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
    .error-msg   { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .error-code  { margin-top: 10px; font-size: 11px; font-family: ui-monospace, monospace; color: var(--red); opacity: 0.55; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1000px) { .stats-overall { grid-template-columns: repeat(3, 1fr); } .modes-grid { grid-template-columns: repeat(3, 1fr); } .events-grid { grid-template-columns: 1fr; } }
    @media (max-width: 700px)  { nav { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 8px; } .search-form { order: 3; max-width: 100%; flex: 1 1 100%; } .nav-right { order: 2; } .stats-overall { grid-template-columns: repeat(2, 1fr); } .modes-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .modes-grid { grid-template-columns: 1fr; } .profile-name { font-size: 24px; } }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">FN<span>·</span>TRACK</div>
  <form class="search-form" id="searchForm" autocomplete="off">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Player name…" value="sukalsify" spellcheck="false">
    </div>
    <select class="platform-select" id="platformSelect">
      <option value="epic">Epic</option>
      <option value="psn">PSN</option>
      <option value="xbl">Xbox</option>
    </select>
    <button class="btn-search" id="btnSearch" type="submit">Search</button>
  </form>
  <div class="nav-right">
    <button class="btn-refresh" id="btnRefresh" title="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Refresh
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero"><div class="hero-grid"></div></div>

<!-- PROFILE (overlaps hero via negative margin) -->
<div class="profile-outer" id="profileOuter" style="display:none">
  <div class="profile-card">
    <div class="avatar" id="avatarInitials">--</div>
    <div class="profile-info">
      <div class="profile-name" id="profileName"></div>
      <div class="profile-meta">
        <span class="badge badge-bp"       id="bpBadge"      style="display:none"></span>
        <span class="badge badge-platform" id="platformBadge"></span>
        <span class="badge badge-updated"  id="updatedBadge"></span>
      </div>
    </div>
  </div>
</div>

<!-- TAB NAV -->
<div class="tab-nav" id="tabNav" style="display:none">
  <button class="tab-btn active" data-tab="stats">Stats</button>
  <button class="tab-btn" data-tab="events">Events</button>
  <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LANDING -->
  <div id="landingArea" class="landing">
    <div class="landing-icon">🎮</div>
    <div class="landing-title">Search for a player</div>
    <div class="landing-sub">Enter a player name above and press Search</div>
  </div>

  <!-- STATS TAB -->
  <div id="tabStats" style="display:none">
    <div class="controls">
      <span class="section-label">Overall Stats</span>
      <div class="toggle-group">
        <button class="toggle-btn active" data-window="lifetime">Lifetime</button>
        <button class="toggle-btn" data-window="season">Season</button>
      </div>
    </div>
    <div id="overallArea"></div>
    <div id="modesArea"></div>
  </div>

  <!-- EVENTS TAB -->
  <div id="tabEvents" style="display:none">
    <div id="eventsArea">
      <div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading events…</div></div>
    </div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div id="tabLeaderboard" style="display:none">
    <div class="lb-header">
      <span class="section-label">Searched Players</span>
      <div class="lb-sort-btns">
        <button class="lb-sort-btn active" data-sort="kd">K/D</button>
        <button class="lb-sort-btn" data-sort="wins">Wins</button>
        <button class="lb-sort-btn" data-sort="kills">Kills</button>
        <button class="lb-sort-btn" data-sort="matches">Matches</button>
      </div>
    </div>
    <div id="leaderboardArea">
      <div class="lb-empty">Search for players — they'll appear here for comparison.</div>
    </div>
  </div>

</div>

<script>
const API_KEY = '5c73bf66-6345-461d-9dd3-3ec9c890443a';

let currentWindow   = 'lifetime';
let currentPlayer   = '';
let currentPlatform = 'epic';
let isLoading       = false;
let activeTab       = 'stats';
let lbSortKey       = 'kd';
const leaderboard   = new Map(); // name+platform -> stats snapshot

// ── helpers ──────────────────────────────────────────────────────────────────
const fmt    = n => (n == null || isNaN(n)) ? '—' : Number(n).toLocaleString('en-US');
const fmtPct = n => (n == null || isNaN(n)) ? '—' : Number(n).toFixed(1) + '%';
const fmtKD  = n => (n == null || isNaN(n)) ? '—' : Number(n).toFixed(2);
const fmtTime = mins => {
  if (mins == null || isNaN(mins)) return '—';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h + 'h ' + m + 'm';
};
const initials = name => name ? name.slice(0, 2).toUpperCase() : '??';
const platformLabel = p => ({ epic: 'Epic', psn: 'PSN', xbl: 'Xbox' }[p] || p);
const relativeTime = iso => {
  if (!iso) return 'never';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
};

// ── fetch stats ───────────────────────────────────────────────────────────────
async function fetchStats(name, platform, timeWindow) {
  const params = new URLSearchParams({ name, accountType: platform, timeWindow });
  const res  = await fetch(`https://fortnite-api.com/v2/stats/br/v2?${params}`, {
    headers: { 'Authorization': API_KEY },
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(`${res.status} — ${body?.error || res.statusText}`);
  return body;
}

// ── fetch events/news ─────────────────────────────────────────────────────────
async function fetchNews() {
  const res  = await fetch('https://fortnite-api.com/v2/news/br');
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error('Failed to load news');
  return body.data;
}

// ── render profile ────────────────────────────────────────────────────────────
function renderProfile(data, platform) {
  const name = data.account?.name || currentPlayer;
  document.getElementById('profileOuter').style.display = 'block';
  document.getElementById('tabNav').style.display       = 'flex';
  document.getElementById('profileName').textContent    = name;
  document.getElementById('avatarInitials').textContent = initials(name);
  const bpLevel = data.battlePass?.level;
  const bpEl = document.getElementById('bpBadge');
  if (bpLevel) { bpEl.textContent = `BP ${bpLevel}`; bpEl.style.display = ''; }
  else bpEl.style.display = 'none';
  document.getElementById('platformBadge').textContent = platformLabel(platform);
  const lastMod = data.stats?.all?.overall?.lastModified;
  document.getElementById('updatedBadge').textContent  = 'Updated ' + relativeTime(lastMod);
}

// ── render overall stats ──────────────────────────────────────────────────────
function statCard(label, value, sub) {
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
  </div>`;
}

function renderOverall(overall) {
  if (!overall) {
    document.getElementById('overallArea').innerHTML =
      `<div class="error-box"><div class="error-title">No Data</div><div class="error-msg">No stats for this time window.</div></div>`;
    return;
  }
  const kpm = overall.killsPerMatch != null ? Number(overall.killsPerMatch).toFixed(2) : '—';
  document.getElementById('overallArea').innerHTML = `
    <div class="stats-overall">
      ${statCard('Wins',      fmt(overall.wins),              fmtPct(overall.winRate) + ' win rate')}
      ${statCard('K/D',       fmtKD(overall.kd),              fmt(overall.kills) + ' kills')}
      ${statCard('Matches',   fmt(overall.matches),            null)}
      ${statCard('Kills',     fmt(overall.kills),              kpm + ' per match')}
      ${statCard('Play Time', fmtTime(overall.minutesPlayed),  null)}
      ${statCard('Win Rate',  fmtPct(overall.winRate),         fmt(overall.wins) + ' wins')}
    </div>`;
}

// ── render mode cards ─────────────────────────────────────────────────────────
function modeCard(key, label, cls, all) {
  const m = all?.[key];
  const hasData = m && m.matches > 0;
  if (!hasData) return `<div class="mode-card ${cls} no-data">
    <div class="mode-header"><div class="mode-name">${label}</div><div class="mode-dot"></div></div>
    <div class="no-data-label">0 matches played</div>
  </div>`;
  return `<div class="mode-card ${cls}">
    <div class="mode-header"><div class="mode-name">${label}</div><div class="mode-dot"></div></div>
    <div class="mode-stats">
      <div><div class="mode-stat-label">K/D</div><div class="mode-stat-val">${fmtKD(m.kd)}</div></div>
      <div><div class="mode-stat-label">Wins</div><div class="mode-stat-val">${fmt(m.wins)}</div></div>
      <div><div class="mode-stat-label">Win%</div><div class="mode-stat-val">${fmtPct(m.winRate)}</div></div>
      <div><div class="mode-stat-label">Kills</div><div class="mode-stat-val">${fmt(m.kills)}</div></div>
    </div>
    <div class="mode-matches">${fmt(m.matches)} matches · ${fmtTime(m.minutesPlayed)}</div>
  </div>`;
}

function renderModes(all) {
  document.getElementById('modesArea').innerHTML = `
    <div class="modes-label" style="margin-top:8px">By Mode</div>
    <div class="modes-grid">
      ${modeCard('solo',  'Solo',   'mode-solo',  all)}
      ${modeCard('duo',   'Duos',   'mode-duo',   all)}
      ${modeCard('trio',  'Trios',  'mode-trio',  all)}
      ${modeCard('squad', 'Squads', 'mode-squad', all)}
      ${modeCard('ltm',   'LTM',    'mode-ltm',   all)}
    </div>`;
}

// ── render events/news ────────────────────────────────────────────────────────
async function loadEvents() {
  document.getElementById('eventsArea').innerHTML =
    `<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading events…</div></div>`;
  try {
    const data  = await fetchNews();
    const items = [...(data?.motds || []), ...(data?.messages || [])].filter(x => !x.hidden);
    if (!items.length) {
      document.getElementById('eventsArea').innerHTML =
        `<div class="landing"><div class="landing-title">No events right now</div><div class="landing-sub">Check back later.</div></div>`;
      return;
    }
    document.getElementById('eventsArea').innerHTML = `
      <div class="section-label" style="margin-bottom:16px">Current Events &amp; Announcements</div>
      <div class="events-grid">
        ${items.map(item => `
          <div class="event-card">
            ${item.image || item.tileImage ? `<img class="event-img" src="${item.image || item.tileImage}" alt="" loading="lazy">` : ''}
            <div class="event-body">
              <div class="event-title">${item.title || item.tabTitle || 'Event'}</div>
              ${item.body ? `<div class="event-text">${item.body}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
  } catch (err) {
    document.getElementById('eventsArea').innerHTML =
      `<div class="error-box"><div class="error-title">Could not load events</div><div class="error-msg">Check your internet connection.</div><div class="error-code">${err.message}</div></div>`;
  }
}

// ── leaderboard ───────────────────────────────────────────────────────────────
function addToLeaderboard(name, platform, overall) {
  if (!overall) return;
  const key = name.toLowerCase() + '|' + platform;
  leaderboard.set(key, {
    name, platform,
    kd:      Number(overall.kd)      || 0,
    wins:    Number(overall.wins)    || 0,
    kills:   Number(overall.kills)   || 0,
    matches: Number(overall.matches) || 0,
    winRate: Number(overall.winRate) || 0,
  });
  if (activeTab === 'leaderboard') renderLeaderboard();
}

function renderLeaderboard() {
  const entries = [...leaderboard.values()].sort((a, b) => b[lbSortKey] - a[lbSortKey]);
  if (!entries.length) {
    document.getElementById('leaderboardArea').innerHTML =
      `<div class="lb-empty">Search for players — they'll appear here for comparison.</div>`;
    return;
  }
  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const isCurrent = e => e.name.toLowerCase() === currentPlayer.toLowerCase() && e.platform === currentPlatform;
  document.getElementById('leaderboardArea').innerHTML = `
    <table class="lb-table">
      <thead><tr>
        <th>#</th><th>Player</th>
        <th class="num">K/D</th><th class="num">Wins</th>
        <th class="num">Kills</th><th class="num">Matches</th><th class="num">Win%</th>
      </tr></thead>
      <tbody>
        ${entries.map((e, i) => `<tr class="${isCurrent(e) ? 'me' : ''}">
          <td><span class="lb-rank ${rankClass(i)}">#${i + 1}</span></td>
          <td><span class="lb-player">${e.name}</span><span class="lb-platform">${platformLabel(e.platform)}</span></td>
          <td class="num">${fmtKD(e.kd)}</td>
          <td class="num">${fmt(e.wins)}</td>
          <td class="num">${fmt(e.kills)}</td>
          <td class="num">${fmt(e.matches)}</td>
          <td class="num">${fmtPct(e.winRate)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tabStats').style.display       = tab === 'stats'       ? 'block' : 'none';
  document.getElementById('tabEvents').style.display      = tab === 'events'      ? 'block' : 'none';
  document.getElementById('tabLeaderboard').style.display = tab === 'leaderboard' ? 'block' : 'none';
  if (tab === 'leaderboard') renderLeaderboard();
}

// ── load player stats ─────────────────────────────────────────────────────────
function setLoading(on) {
  isLoading = on;
  document.getElementById('btnSearch').disabled  = on;
  document.getElementById('btnRefresh').disabled = on;
}

async function load(name, platform, timeWindow) {
  if (!name.trim()) return;
  setLoading(true);
  document.getElementById('landingArea').style.display = 'none';
  document.getElementById('tabStats').style.display    = activeTab === 'stats' ? 'block' : 'none';
  document.getElementById('overallArea').innerHTML =
    `<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Searching <strong>${name}</strong>…</div></div>`;
  document.getElementById('modesArea').innerHTML = '';

  try {
    const json = await fetchStats(name, platform, timeWindow);
    const data = json.data;
    renderProfile(data, platform);
    const all = data?.stats?.all;
    renderOverall(all?.overall);
    renderModes(all);
    addToLeaderboard(data.account?.name || name, platform, all?.overall);
  } catch (err) {
    document.getElementById('profileOuter').style.display = 'none';
    document.getElementById('tabNav').style.display       = 'none';
    document.getElementById('overallArea').innerHTML = `
      <div class="error-box">
        <div class="error-title">Player not found</div>
        <div class="error-msg">Could not find <strong>${name}</strong> on ${platformLabel(platform)}.<br>Check the name and platform.</div>
        <div class="error-code">${err.message}</div>
      </div>`;
    document.getElementById('modesArea').innerHTML = '';
    document.getElementById('tabStats').style.display = 'block';
  } finally {
    setLoading(false);
  }
}

// ── events ────────────────────────────────────────────────────────────────────
document.getElementById('searchForm').addEventListener('submit', e => {
  e.preventDefault();
  const name     = document.getElementById('searchInput').value.trim();
  const platform = document.getElementById('platformSelect').value;
  if (!name || isLoading) return;
  currentPlayer   = name;
  currentPlatform = platform;
  switchTab('stats');
  load(name, platform, currentWindow);
});

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const w = btn.dataset.window;
    if (w === currentWindow || !currentPlayer) return;
    currentWindow = w;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
    load(currentPlayer, currentPlatform, currentWindow);
  });
});

document.getElementById('btnRefresh').addEventListener('click', () => {
  if (currentPlayer) load(currentPlayer, currentPlatform, currentWindow);
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    switchTab(tab);
    if (tab === 'events') loadEvents();
  });
});

document.querySelectorAll('.lb-sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lbSortKey = btn.dataset.sort;
    document.querySelectorAll('.lb-sort-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderLeaderboard();
  });
});

// ── init ──────────────────────────────────────────────────────────────────────
currentPlayer   = 'sukalsify';
currentPlatform = 'epic';
load(currentPlayer, currentPlatform, currentWindow);
</script>
</body>
</html>
